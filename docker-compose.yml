# ==============================
# Perplexo API - Docker Compose
# ==============================
# Versão sem VPN. Para roteamento via NordVPN, use docker-compose.vpn.yml

services:
  perplexo-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: perplexo-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MCP_PORT=5000
      - TOKENS_DIR=/app/data/tokens
      - CONVERSATIONS_DIR=/app/data/conversations
    ports:
      - "5000:5000"
    volumes:
      - perplexo-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s


volumes:
  perplexo-data:
